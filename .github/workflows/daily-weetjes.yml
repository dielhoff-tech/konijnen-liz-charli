name: Dagelijkse konijnenweetjes

on:
  schedule:
    - cron: "30 5 * * *"   # 07:30 Nederlandse tijd (UTC+2 zomer)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weetjes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Genereer weetjes en update index.html
        run: python .github/scripts/update_weetjes.py

      - name: Commit en push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "🐰 Dagelijkse weetjes $(date +%Y-%m-%d)"
          git push
