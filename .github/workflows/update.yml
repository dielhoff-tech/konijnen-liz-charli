name: Dagelijkse weetjes – 07:30 Amsterdam

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC = 07:30 Amsterdam (CEST)
  workflow_dispatch:        # ook handmatig te starten

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python opzetten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Genereer weetjes.json
        run: python update_weetjes.py

      - name: Commit en push
        run: |
          git config user.name  "Konijnen Bot"
          git config user.email "konijnen-bot@users.noreply.github.com"
          git add weetjes.json
          git diff --cached --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "🐰 Weetjes $(date +%Y-%m-%d)"
          git push

